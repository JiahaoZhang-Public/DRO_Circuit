task: ioi
n_examples: 100
seed: 42
output_dir: outputs/plan_a_ioi

model:
  name: gpt2
  device: cuda

corruption:
  families:
    - S2_IO
    - IO_RAND
    - S_RAND

scoring:
  method: EAP-IG-inputs
  ig_steps: 5
  intervention: patching
  aggregation: sum
  batch_size: 32

dro:
  aggregator: max

selection:
  n_edges: 200
  selection_method: topn
  absolute: true

eval:
  intervention: patching
  batch_size: 32
